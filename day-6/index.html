<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBEBOX Music Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">


        <aside class="sidebar">

            <h1>VIBEBOX 🎵</h1>

            <ul>
                <li>🏠 Home</li>
                <li>🔥 Trending</li>
                <li>🎧 Playlists</li>
                <li>❤️ Favorites</li>
                <li>⚙️ Settings</li>
            </ul>

        </aside>

        <main class="main-content">


            <section class="banner">

                <div>
                    <h2>Feel The Music</h2>

                    <p>
                        Discover trending songs, albums, and artists
                        from around the world.
                    </p>

                    <button>Listen Now</button>
                </div>

                <img src="cover.webp" alt="Album Cover">

            </section>

            <section>

                <h2>Trending Songs</h2>

                <div class="songs-grid">

                    <div class="song-card">
                        <img src="song1.png" alt="">
                        <h3>Midnight Echo</h3>
                        <p>The Weeknd</p>
                    </div>

                    <div class="song-card">
                        <img src="song2.png" alt="">
                        <h3>Lost Lights</h3>
                        <p>Dua Lipa</p>
                    </div>

                    <div class="song-card">
                        <img src="song3.png" alt="">
                        <h3>Electric Dreams</h3>
                        <p>Travis Scott</p>
                    </div>

                    <div class="song-card">
                        <img src="song4.png" alt="">
                        <h3>Ocean Drive</h3>
                        <p>Arctic Monkeys</p>
                    </div>

                </div>

            </section>

        </main>

    </div>

</body>

</html>
