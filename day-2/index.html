<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>

<body>

    <header>
        <h1>Student Registration Form</h1>
        <p>Please fill out the form below.</p>
        <hr>
    </header>

    <section>

        <form>

            <h2>Personal Information</h2>

            <label>Full Name:</label><br>
            <input type="text" placeholder="Enter your name"><br><br>

            <label>Email:</label><br>
            <input type="email" placeholder="Enter your email"><br><br>

            <label>Password:</label><br>
            <input type="password" placeholder="Enter password"><br><br>

            <label>Date of Birth:</label><br>
            <input type="date"><br><br>

            <label>Phone Number:</label><br>
            <input type="tel" placeholder="Enter phone number"><br><br>

            <h2>Academic Details</h2>

            <label>Department:</label><br>
            <select>
                <option>Computer Science</option>
                <option>Information Technology</option>
                <option>Electronics</option>
                <option>Mechanical</option>
            </select><br><br>

            <label>Year:</label><br>

            <input type="radio" name="year"> 1st Year
            <input type="radio" name="year"> 2nd Year
            <input type="radio" name="year"> 3rd Year
            <input type="radio" name="year"> 4th Year
            <br><br>

            <h2>Skills & Interests</h2>

            <input type="checkbox"> Web Development <br>
            <input type="checkbox"> App Development <br>
            <input type="checkbox"> UI/UX Design <br>
            <input type="checkbox"> Cyber Security <br><br>

            <label>About Yourself:</label><br>
            <textarea rows="5" cols="40" placeholder="Write something about yourself..."></textarea><br><br>

            <label>Upload Profile Photo:</label><br>
            <input type="file"><br><br>

            <input type="submit" value="Register">

        </form>

    </section>

    <footer>
        <hr>
        <p>Created by Michael Josewin</p>
    </footer>

</body>

</html>
