<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartVend UI</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <header>

        <h1>SMARTVEND 🥤</h1>

        <p>Select Your Favorite Drink</p>

    </header>

    <section class="products">

        <div class="card">
            <img src="images/coke.webp" alt="Coke">
            <h2>Coca Cola</h2>
            <p>$2.00</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="images/pepsi.webp" alt="Pepsi">
            <h2>Pepsi</h2>
            <p>$2.50</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="images/sprite.jpg" alt="Sprite">
            <h2>Sprite</h2>
            <p>$1.50</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="images/mineral.avif" alt="Water">
            <h2>Mineral Water</h2>
            <p>$1.00</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="images/coffee.webp" alt="Coffee">
            <h2>Cold Coffee</h2>
            <p>$3.00</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="images/energy.jpg" alt="Energy Drink">
            <h2>Energy Drink</h2>
            <p>$4.00</p>
            <button>Buy Now</button>
        </div>

    </section>

</body>

</html>
